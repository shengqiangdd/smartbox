name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22, 23]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
        run: |
          cd frontend && npm install

      - name: Type check
        run: |
          cd frontend && npx tsc --noEmit

      - name: Build
        run: |
          cd frontend && npm run build

      - name: Auto test
        run: |
          nohup npx vite preview --port 3100 --root frontend &
          for i in $(seq 1 10); do curl -sf -o /dev/null http://localhost:3100 && break; sleep 1; done
          bash scripts/auto-test.sh 3100

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartbox-dist-${{ matrix.node-version }}
          path: frontend/dist/
