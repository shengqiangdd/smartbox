<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- 智字简化图标 -->
  <g transform="translate(256,256)" fill="none" stroke="#fff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- 盒子轮廓 -->
    <rect x="-120" y="-100" width="240" height="200" rx="20"/>
    <!-- 盒子横线 -->
    <line x1="-120" y1="-40" x2="120" y2="-40"/>
    <!-- X 光效 -->
    <line x1="-60" y1="-20" x2="60" y2="60"/>
    <line x1="60" y1="-20" x2="-60" y2="60"/>
    <!-- 底部小点 -->
    <circle cx="-40" cy="30" r="8"/>
    <circle cx="0" cy="30" r="8"/>
    <circle cx="40" cy="30" r="8"/>
  </g>
</svg>
