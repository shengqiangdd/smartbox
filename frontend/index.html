<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="build-version" content="<%- buildVersion %>" />
    <meta name="build-time" content="<%- buildTime %>" />
    <meta name="description" content="棘轮工具箱 Wrench - 可插拔、AI增强的网页版生产力工具箱" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Wrench" />
    <meta name="application-name" content="Wrench" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="mask-icon" href="/icons/icon.svg" color="#6366f1" />
    <title>棘轮工具箱 Wrench</title>
  </head>
  <body class="bg-slate-950 text-slate-100 antialiased">
    <div id="root"></div>
    <script>
      // Vite 8 + @vitejs/plugin-react v6: refresh preamble fix
      // In non-bundled dev mode, OXC transform adds $RefreshSig$() calls
      // but the preamble script is not injected. We define it here as a shim.
      if (!window.$RefreshSig$) window.$RefreshSig$ = function() { return function(t) { return t; }; };
      if (!window.$RefreshReg$) window.$RefreshReg$ = function() {};
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
