services:
  smartbox:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # 每次 docker compose build 自动注入时间戳，确保前端构建层不命中缓存
        BUILD_HASH: "${BUILD_HASH:-$(date +%Y%m%d%H%M%S)}"
    image: ghcr.io/shengqiangdd/smartbox:latest
    container_name: smartbox
    ports:
      - "3001:3001"   # 后端 API + WebSocket
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
